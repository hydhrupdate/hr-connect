<title>Friends Connect</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f1f5f9;min-height:100vh}
#LP{background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center}
#LP .box{background:white;padding:36px;border-radius:16px;width:340px}
#LP h2{font-size:22px;font-weight:800;margin-bottom:4px;color:#111}
#LP h2 span{color:#059669}
#LP .sub{color:#666;font-size:13px;margin-bottom:20px}
.tabs{display:flex;background:#f8fafc;border-radius:8px;padding:3px;margin-bottom:18px;border:1px solid #eee}
.tab{flex:1;padding:11px;border:none;background:transparent;font-size:13px;font-weight:700;color:#666;border-radius:6px;cursor:pointer}
.tab.on{background:#111;color:white}
.flbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:5px}
.inp{width:100%;padding:12px;border:2px solid #eee;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;font-family:Arial}
.inp:focus{border-color:#059669}
.lbtn{width:100%;padding:13px;background:#111;border:none;border-radius:8px;color:white;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.lbtn:hover{background:#059669}
.err{margin-top:10px;padding:8px;border-radius:6px;font-size:13px;text-align:center;display:none;background:#fee2e2;color:#dc2626}
#DP{display:none}
.tb{background:#111;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.tb-logo{color:white;font-size:16px;font-weight:800}
.tb-logo em{color:#6ee7b7;font-style:normal}
.tb-user{color:rgba(255,255,255,0.7);font-size:12px}
.tb-out{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.nav{background:white;border-bottom:1px solid #e5e7eb;display:flex;padding:0 20px;overflow-x:auto}
.nb{padding:12px 16px;border:none;background:transparent;font-size:13px;font-weight:700;color:#666;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nb.on{color:#059669;border-bottom-color:#059669}
.ct{max-width:860px;margin:0 auto;padding:20px 16px}
.card{background:white;border-radius:12px;border:1px solid #e5e7eb;padding:20px;margin-bottom:14px}
.card h3{font-size:15px;font-weight:700;margin-bottom:14px;color:#111}
.fi{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;margin-bottom:9px;font-family:Arial}
.fi:focus{border-color:#059669}
.fta{min-height:85px;resize:vertical}
.gb{background:#059669;color:white;border:none;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}
.gb:hover{background:#047857}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:white;border-radius:10px;border:1px solid #e5e7eb;padding:14px;text-align:center}
.sn{font-size:26px;font-weight:800;color:#111}
.sl{font-size:11px;color:#666;margin-top:2px}
.fps{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.fp{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #e5e7eb;background:white;color:#666}
.fp.on{background:#111;color:white;border-color:#111}
.uc{background:white;border-radius:10px;border:1px solid #e5e7eb;padding:15px;margin-bottom:10px}
.utop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.utag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase}
.ta{background:#d1fae5;color:#059669}.tp{background:#fef3c7;color:#d97706}
.te{background:#dbeafe;color:#2563eb}.tr{background:#fee2e2;color:#dc2626}.tg{background:#f1f5f9;color:#666}
.tb2{background:#fdf4ff;color:#7e22ce}
.ut{font-size:14px;font-weight:700;color:#111;margin-bottom:4px}
.ub{font-size:13px;color:#4b5563;line-height:1.6;white-space:pre-wrap}
.uf{margin-top:9px;padding-top:8px;border-top:1px solid #f1f5f9;font-size:11px;color:#999;display:flex;justify-content:space-between}
.pc{background:white;border-radius:10px;border:1.5px solid #dbeafe;padding:15px;margin-bottom:10px}
.pb2{background:#dbeafe;color:#2563eb;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:8px}
.pq{font-size:14px;font-weight:700;color:#111;margin-bottom:10px}
.pbar{margin-bottom:7px}
.pbl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:3px}
.pbbg{height:6px;background:#e5e7eb;border-radius:10px;overflow:hidden}
.pbf{height:100%;background:#059669;border-radius:10px}
.ar{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f8fafc;flex-wrap:wrap}
.aid{font-weight:700;font-size:12px;width:70px;color:#111}
.an{flex:1;font-size:12px;color:#374151;min-width:100px}
.sb{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.sa{background:#d1fae5;color:#059669}.si{background:#f1f5f9;color:#666}
.sm2{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #e5e7eb;background:white;color:#666}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid #e5e7eb;background:white;cursor:pointer;color:#666}
.chip.on{border-color:#059669;background:#d1fae5;color:#059669}
.vchip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid #e5e7eb;background:white;cursor:pointer;color:#666}
.vchip.on{border-color:#2563eb;background:#dbeafe;color:#2563eb}
.toast{position:fixed;bottom:18px;right:18px;background:#111;color:white;padding:11px 16px;border-radius:9px;font-size:13px;display:none;z-index:999}
.nbadge{display:inline-block;background:#dc2626;color:white;font-size:10px;font-weight:800;padding:1px 5px;border-radius:20px;margin-left:5px;vertical-align:middle}
.empty{text-align:center;padding:36px;color:#94a3b8;font-size:13px}
.lbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:6px;margin-top:4px}
@media(max-width:580px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

async function fsGet(col) {
  try {
    var r = await fetch(BASE+col+'?key='+APIKEY+'&pageSize=500');
    var d = await r.json();
    if (!d.documents) return [];
    return d.documents.map(function(doc) {
      return Object.assign({fid:doc.name.split('/').pop()}, parseDoc(doc.fields));
    });
  } catch(e) { return []; }
}
async function fsAdd(col, obj) {
  try { await fetch(BASE+col+'?key='+APIKEY, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:toF(obj)})}); }
  catch(e) { console.error(e); }
}
async function fsPatch(col, id, obj) {
  try {
    var fields = toF(obj);
    var mask = Object.keys(fields).map(function(k) { return 'updateMask.fieldPaths='+k; }).join('&');
    await fetch(BASE+col+'/'+id+'?key='+APIKEY+'&'+mask, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:fields})});
  } catch(e) { console.error(e); }
}
async function fsDel(col, id) {
  try { await fetch(BASE+col+'/'+id+'?key='+APIKEY, {method:'DELETE'}); }
  catch(e) { console.error(e); }
}
function toF(obj) {
  var f = {};
  Object.keys(obj).forEach(function(k) {
    var v = obj[k];
    if (v === null || v === undefined) { f[k] = {nullValue:null}; }
    else if (Array.isArray(v)) { f[k] = {arrayValue:{values:v.map(function(i) { return {stringValue:String(i)}; })}}; }
    else if (typeof v === 'object') { f[k] = {mapValue:{fields:toF(v)}}; }
    else if (typeof v === 'number') { f[k] = {integerValue:String(v)}; }
    else if (typeof v === 'boolean') { f[k] = {booleanValue:v}; }
    else { f[k] = {stringValue:String(v)}; }
  });
  return f;
}
function parseDoc(fields) {
  if (!fields) return {};
  var obj = {};
  Object.keys(fields).forEach(function(k) {
    var v = fields[k];
    if ('stringValue' in v) obj[k] = v.stringValue;
    else if ('integerValue' in v) obj[k] = parseInt(v.integerValue);
    else if ('booleanValue' in v) obj[k] = v.booleanValue;
    else if ('arrayValue' in v) obj[k] = (v.arrayValue.values||[]).map(function(i) { return i.stringValue||String(i.integerValue||''); });
    else if ('mapValue' in v) obj[k] = parseDoc(v.mapValue.fields);
    else if ('timestampValue' in v) obj[k] = v.timestampValue;
  });
  return obj;
}

async function fsFullUpdate(col, id, poll, newVotes, newVotedBy, newChoices) {
  // Build complete updated document to avoid nested map patch issues
  var updated = {
    type: poll.type||'poll',
    question: poll.question||'',
    options: poll.options||[],
    visibility: poll.visibility||['all'],
    votedBy: newVotedBy,
    voterChoices: newChoices,
    createdAt: poll.createdAt||new Date().toISOString()
  };
  // Add votes as individual string fields to avoid map issues
  var fields = toF(updated);
  // Add votes manually as map
  var voteFields = {};
  Object.keys(newVotes).forEach(function(k) {
    voteFields[k] = {integerValue: String(parseInt(newVotes[k])||0)};
  });
  fields['votes'] = {mapValue: {fields: voteFields}};
  try {
    await fetch(BASE+col+'/'+id+'?key='+APIKEY, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({fields: fields})
    });
  } catch(e) { console.error(e); }
}

function downloadVotes(pid) {
  var poll = S.updates.find(function(u) { return u.fid === pid; });
  if (!poll) return;
  var assocMap = {};
  S.assocs.forEach(function(a) { assocMap[a.id] = a.name; });
  var voterChoices = {};
  if (poll.voterChoices && typeof poll.voterChoices === 'string') {
    poll.voterChoices.split('|').forEach(function(pair) {
      var idx = pair.indexOf(':');
      if (idx > 0) voterChoices[pair.slice(0,idx)] = pair.slice(idx+1);
    });
  }
  var rows = ['Poll Question,Voter ID,Voter Name,Their Vote'];
  var votedBy = poll.votedBy || [];
  votedBy.forEach(function(vid) {
    var name = assocMap[vid] || vid;
    var choice = voterChoices[vid] || 'Unknown';
    rows.push('"'+(poll.question||'').replace(/"/g,'')+'",' +'"'+vid+'",' +'"'+name+'",' +'"'+choice+'"');
  });
  if (votedBy.length === 0) rows.push('No votes yet');
  var csv = rows.join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'poll-respondents.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded!');
}

function compressImage(file, callback) {
  var canvas = document.createElement('canvas');
  var img = new Image();
  img.onload = function() {
    var max = 600, w = img.width, h = img.height;
    if (w > max) { h = h*max/w; w = max; }
    if (h > max) { w = w*max/h; h = max; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.6));
  };
  img.src = URL.createObjectURL(file);
}

// SERVICE WORKER + NOTIFICATIONS
function updateNotifBtn() {
  var btn = document.getElementById('notifBtn');
  if (!btn) return;
  if (!('Notification' in window)) { btn.style.display='none'; return; }
  if (Notification.permission === 'granted') {
    btn.textContent = '🔔 Alerts On';
    btn.style.background = 'rgba(16,185,129,0.3)';
    btn.style.color = '#6ee7b7';
    btn.onclick = null;
  } else if (Notification.permission === 'denied') {
    btn.textContent = '🔕 Blocked';
    btn.style.background = 'rgba(220,38,38,0.3)';
    btn.style.color = '#fca5a5';
    btn.onclick = function() {
      alert('Notifications are blocked. Please click the lock icon in your browser address bar and allow notifications for this site.');
    };
  } else {
    btn.textContent = '🔔 Enable Alerts';
    btn.style.background = 'rgba(255,255,255,0.1)';
    btn.style.color = 'rgba(255,255,255,0.85)';
    btn.onclick = enableNotifications;
  }
}

function enableNotifications() {
  if (!('Notification' in window)) {
    alert('Your browser does not support notifications.');
    return;
  }
  if (Notification.permission === 'granted') {
    registerServiceWorker();
    toast('Notifications already enabled!');
    updateNotifBtn();
    return;
  }
  Notification.requestPermission().then(function(perm) {
    if (perm === 'granted') {
      registerServiceWorker();
      toast('Notifications enabled! You will be alerted when HR posts.');
      updateNotifBtn();
      // Send a test notification
      setTimeout(function() {
        showBgNotification('Notifications Enabled!', 'You will now receive HR updates.');
      }, 1000);
    } else if (perm === 'denied') {
      toast('Notifications blocked. Enable in browser settings.');
      updateNotifBtn();
    }
  });
}
var SW_REG = null;

async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  try {
    SW_REG = await navigator.serviceWorker.register('./sw.js');
    console.log('SW registered');
    // Start background polling every 30 seconds
    startBackgroundCheck();
  } catch(e) {
    console.log('SW registration failed:', e);
  }
}

var BG_INTERVAL = null;
var LAST_UPDATE_COUNT = 0;

function startBackgroundCheck() {
  if (BG_INTERVAL) clearInterval(BG_INTERVAL);
  BG_INTERVAL = setInterval(async function() {
    if (!CU) return;
    try {
      var r = await fetch(BASE+'updates?key='+APIKEY+'&pageSize=500');
      var d = await r.json();
      var count = (d.documents||[]).length;
      if (LAST_UPDATE_COUNT > 0 && count > LAST_UPDATE_COUNT) {
        var diff = count - LAST_UPDATE_COUNT;
        showBgNotification('New Update Posted', diff+' new update'+(diff>1?'s':'')+' from HR!');
      }
      LAST_UPDATE_COUNT = count;
    } catch(e) {}
  }, 30000); // check every 30 seconds
}

function showBgNotification(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    try {
      if (SW_REG) {
        SW_REG.showNotification('Friends Connect - '+title, {
          body: body,
          icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png',
          badge: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png',
          tag: 'hr-update',
          requireInteraction: true,
          vibrate: [200, 100, 200]
        });
      } else {
        new Notification('Friends Connect - '+title, { body: body });
      }
    } catch(e) {}
  }
}

// NOTIFICATIONS
function requestPushPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(function(perm) {
      if (perm === 'granted') {
        registerServiceWorker();
        toast('Notifications enabled!');
      }
    });
  } else if (Notification.permission === 'granted') {
    registerServiceWorker();
  }
}

function sendPushNotification(title, body) {
  showBgNotification(title, body);
}

function getLastSeenTime() {

}

  try { sessionStorage.setItem('lastSeen', String(Date.now())); } catch(e) {}
}

function countNewUpdates() {
  var lastSeen = getLastSeenTime();
  if (!lastSeen) return 0;
  return S.updates.filter(function(u) {
    if (!u.createdAt) return false;
    return new Date(u.createdAt).getTime() > lastSeen;
  }).length;
}

// COMMENTS
function renderComments(p) {
  var comments = [];
  if (p.commentsStr && p.commentsStr.trim()) {
    p.commentsStr.split('||').forEach(function(c) {
      if (!c.trim()) return;
      var parts = c.split('|');
      if (parts.length >= 4) {
        comments.push({
          cid: parts[0],
          authorId: parts[1],
          author: parts[2],
          text: decodeURIComponent(parts[3]),
          time: parts[4] || ''
        });
      }
    });
  }
  if (!comments.length) return '<div style="font-size:11px;color:#94a3b8;margin-bottom:4px">No comments yet</div>';
  return comments.map(function(c) {
    var canDel = isHRUser() || c.authorId === CU.id || (p.authorId === CU.id);
    return '<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:7px">'+
      '<div style="width:26px;height:26px;border-radius:50%;background:#e0e7ff;color:#3730a3;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">'+esc((c.author||'?')[0].toUpperCase())+'</div>'+
      '<div style="flex:1;background:#f8fafc;border-radius:10px;padding:6px 10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-size:11px;font-weight:700;color:#111">'+esc(c.author)+'</span>'+
      '<div style="display:flex;align-items:center;gap:6px">'+
      '<span style="font-size:10px;color:#94a3b8">'+fmt(c.time)+'</span>'+
      (canDel ? '<button class="delCmtBtn" data-pid="'+p.fid+'" data-cid="'+c.cid+'" style="background:none;border:none;color:#dc2626;font-size:10px;cursor:pointer;padding:0">✕</button>' : '')+
      '</div></div>'+
      '<p style="font-size:12px;color:#374151;margin:2px 0 0">'+esc(c.text)+'</p>'+
      '</div></div>';
  }).join('');
}

async function submitComment(pid, text, inp) {
  inp.value = '';
  inp.disabled = true;
  var posts = await fsGet('assoc_posts');
  var post = posts.find(function(p) { return p.fid === pid; });
  if (!post) { inp.disabled = false; return; }
  var comments = [];
  if (post.commentsStr && post.commentsStr.trim()) {
    post.commentsStr.split('||').forEach(function(c) { if (c.trim()) comments.push(c); });
  }
  var cid = Date.now().toString();
  var newComment = cid+'|'+CU.id+'|'+CU.name+'|'+encodeURIComponent(text)+'|'+new Date().toISOString();
  comments.push(newComment);
  var commentsStr = comments.join('||');
  await fsPatch('assoc_posts', pid, {commentsStr: commentsStr});
  inp.disabled = false;
  await renderAssocFeed(document.getElementById('main'));
}

async function deleteComment(pid, cid) {
  if (!confirm('Delete this comment?')) return;
  var posts = await fsGet('assoc_posts');
  var post = posts.find(function(p) { return p.fid === pid; });
  if (!post) return;
  var comments = [];
  if (post.commentsStr && post.commentsStr.trim()) {
    post.commentsStr.split('||').forEach(function(c) {
      if (c.trim() && !c.startsWith(cid+'|')) comments.push(c);
    });
  }
  await fsPatch('assoc_posts', pid, {commentsStr: comments.join('||')});
  toast('Comment deleted!');
  await renderAssocFeed(document.getElementById('main'));
}

async function addReaction(pid, rkey) {
  // Always fetch fresh data to avoid stale counts
  var posts = await fsGet('assoc_posts');
  var post = posts.find(function(p) { return p.fid === pid; });
  if (!post) return;

  // Parse reactedBy: "EMP001:like|EMP002:love"
  var reactedBy = {};
  if (post.reactedByStr && post.reactedByStr.trim()) {
    post.reactedByStr.split('|').forEach(function(pair) {
      var idx = pair.indexOf(':');
      if (idx > 0) reactedBy[pair.slice(0,idx).trim()] = pair.slice(idx+1).trim();
    });
  }

  // Parse reactorNames: "like=Ravi,Priya|love=Chandra"
  var reactorNames = {};
  if (post.reactorNamesStr && post.reactorNamesStr.trim()) {
    post.reactorNamesStr.split('|').forEach(function(pair) {
      var idx = pair.indexOf('=');
      if (idx > 0) {
        reactorNames[pair.slice(0,idx).trim()] = pair.slice(idx+1).split(',').map(function(n){return n.trim();}).filter(Boolean);
      }
    });
  }

  // Rebuild reactions count fresh from reactedBy (source of truth)
  var reactions = {};
  Object.keys(reactedBy).forEach(function(uid) {
    var r = reactedBy[uid];
    reactions[r] = (reactions[r]||0) + 1;
  });

  var prevReaction = reactedBy[CU.id] || '';

  // Remove previous reaction
  if (prevReaction) {
    delete reactedBy[CU.id];
    reactorNames[prevReaction] = (reactorNames[prevReaction]||[]).filter(function(n){ return n !== CU.name; });
  }

  // Add new reaction only if different from previous (toggle off if same)
  if (prevReaction !== rkey) {
    reactedBy[CU.id] = rkey;
    if (!reactorNames[rkey]) reactorNames[rkey] = [];
    if (reactorNames[rkey].indexOf(CU.name) < 0) reactorNames[rkey].push(CU.name);
  }

  // Rebuild counts from reactedBy
  reactions = {};
  Object.keys(reactedBy).forEach(function(uid) {
    var r = reactedBy[uid];
    reactions[r] = (reactions[r]||0) + 1;
  });

  // Flatten to strings
  var reactedByStr = Object.keys(reactedBy).map(function(k){ return k+':'+reactedBy[k]; }).join('|');
  var reactorNamesStr = Object.keys(reactorNames).filter(function(k){return reactorNames[k].length>0;}).map(function(k){ return k+'='+reactorNames[k].join(','); }).join('|');

  await fsPatch('assoc_posts', pid, {
    reactions: reactions,
    reactedByStr: reactedByStr,
    reactorNamesStr: reactorNamesStr
  });
  await renderAssocFeed(document.getElementById('main'));
}

async function downloadAssociates() {
  var assocs = await fsGet('associates');
  if (!assocs || !assocs.length) { toast('No associates to download!'); return; }

  // CSV Headers - all fields
  var headers = ['EmployeeID','FullName','Password','Gender','DOB','Role','Group','Status','CreatedAt'];

  var rows = assocs.map(function(a) {
    return [
      a.id || '',
      a.name || '',
      a.password || '',
      a.gender || '',
      a.dob || '',
      a.role || '',
      a.group || '',
      a.status || '',
      a.createdAt ? a.createdAt.slice(0,10) : ''
    ].map(function(val) {
      var s = String(val).replace(/"/g, '""');
      return s.indexOf(',') >= 0 || s.indexOf('"') >= 0 ? '"'+s+'"' : s;
    }).join(',');
  });

  var csv = [headers.join(',')].concat(rows).join('\r\n');ob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var today = new Date().toISOString().slice(0,10);
  a.download = 'associates_' + today + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded ' + assocs.length + ' associates!');
}

    reader.onload = function(e) {
      try {
        var text = e.target.result;
        parsedRows = parseCSV(text);
        showBulkPreview(parsedRows);
      } catch(err) {
        preview.innerHTML = '<div style="color:#dc2626;font-size:13px">Parse error: '+err.message+'</div>';
      }
    };
    reader.readAsText(file, 'UTF-8');
  };

  document.getElementById('bulkSaveBtn').onclick = async function() {
    if (!parsedRows.length) return;
    this.textContent = 'Uploading...'; this.disabled = true;
    var existing = await fsGet('associates');
    var existingIds = existing.map(function(a) { return a.id; });
    var added = 0, skipped = 0;
    var btn = document.getElementById('bulkSaveBtn');
    for (var i = 0; i < parsedRows.length; i++) {
      var r = parsedRows[i];
      if (!r.id || !r.name || !r.password) { skipped++; continue; }
      if (existingIds.indexOf(r.id) >= 0) { skipped++; continue; }
      try {
        await fsAdd('associates', {
          id: r.id,
          name: r.name,
          password: r.password,
          gender: r.gender || '',
          dob: r.dob || '',
          role: r.role || 'associate',
          group: r.group || 'operations',
          secretQuestion: 'What is your DOB?',
          secretAnswer: r.dob || '',
          status: 'active',
          createdAt: new Date().toISOString()
        });
        added++;
        if (btn) btn.textContent = 'Uploading... ('+added+' done)';
      } catch(e) { skipped++; }
    }
    closeBulkModal();
    toast('✅ Added '+added+' associates'+(skipped?' ('+skipped+' skipped)':'')+'!');
    S.assocs = await fsGet('associates');
    await renderAssocsPg(document.getElementById('main'));
  };
}

function parseCSV(text) {
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase().replace(/[^a-z0-9]/g,''); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var cols = lines[i].split(',').map(function(c) { return c.trim(); });
    if (cols.length < 2) continue;
    var row = {};
    headers.forEach(function(h, idx) { row[h] = cols[idx] || ''; });
    var rawDob = row['dob']||row['dateofbirth']||'';
    var dob = rawDob;
    if (rawDob && rawDob.indexOf('-') !== -1) {
      var parts = rawDob.split('-');
      if (parts.length === 3 && parts[2].length === 4) {
        dob = parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');
      }
    }
    rows.push({
      id: String(row['employeeid']||row['id']||'').trim(),
      name: (row['fullname']||row['name']||'').trim(),
      password: (row['password']||'Pass123').trim(),
      gender: (row['gender']||'').toLowerCase().trim(),
      dob: dob,
      role: (row['role']||'associate').toLowerCase().trim(),
      group: (row['group']||'operations').toLowerCase().trim()
    });
  }
  return rows.filter(function(r) { return r.id && r.name; });
}

async function checkAndPostBirthdays() {

    var todayMM = String(today.getMonth()+1).padStart(2,'0');
    var todayDD = String(today.getDate()).padStart(2,'0');
    var todayKey = todayMM+'-'+todayDD; // e.g. "03-13"
    var todayDate = today.toISOString().slice(0,10); // e.g. "2026-03-13"

    // Check if birthday post already made today
    var bdayPosts = S.updates.filter(function(u) {
      return u.tag === 'birthday' && u.createdAt && u.createdAt.slice(0,10) === todayDate;
    });
    if (bdayPosts.length > 0) return; // Already posted today

    // Find associates with birthday today
    var assocs = await fsGet('associates');

      // dob stored as YYYY-MM-DD, extract MM-DD

      if (parts.length < 3) return false;
      var mm = parts[1].padStart(2,'0');

    if (bdays.length === 0) return; // No birthdays today

      'https://cdn.pixabay.com/photo/2016/11/22/19/17/birthday-1850116_640.jpg',

// IPL PREDICTION
function timeLeft(dateStr) {
  var diff = new Date(dateStr) - new Date();
  if (diff <= 0) return 'Closed';
  var h = Math.floor(diff / 3600000);
  var m = Math.floor((diff % 3600000) / 60000);
  if (h > 24) return Math.floor(h/24)+'d '+( h%24)+'h';
  if (h > 0) return h+'h '+m+'m';
  return m+'m';
}

    '<div style="margin-bottom:8px;font-size:13px;font-weight:800;color:#374151">Match Predictions</div>'+
    (matchesHtml || '<div class="empty">No matches yet. HR Admin will create predictions!</div>');

  if (isHR) {
    document.getElementById('iplCreateBtn').onclick = createIPLMatch;
    document.getElementById('iplResetBtn').onclick = resetIPLSeason;
  }

  // Wire predict buttons
  m.querySelectorAll('.iplPredBtn').forEach(function(b) {
    b.onclick = function() { submitIPLPrediction(this.dataset.mid, this.dataset.team); };
  });

  // Wire declare result buttons
  if (isHR) {
    m.querySelectorAll('.iplDeclareBtn').forEach(function(b) {
      b.onclick = function() { declareIPLResult(this.dataset.mid); };
    });
  }
}

function renderIPLMatch(match, isHR) {
  // Parse predictionsStr flat string
  var predictions = {};
  if (match.predictionsStr && match.predictionsStr.trim()) {
    match.predictionsStr.split('|').forEach(function(p){
      var idx = p.indexOf(':');
      if (idx > 0) predictions[p.slice(0,idx).trim()] = p.slice(idx+1).trim();
    });
  }
  var myPred = predictions[CU.id] || '';
  var t1 = match.team1 || '';
  var t2 = match.team2 || '';
  var isDone = match.status === 'done';
  var winner = match.winner || '';
  var totalPreds = Object.keys(predictions).length;
  var t1Count = Object.values(predictions).filter(function(v){return v===t1;}).length;
  var t2Count = Object.values(predictions).filter(function(v){return v===t2;}).length;

  var statusBadge = isDone
    ? '<span style="background:#d1fae5;color:#059669;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">✅ Result Declared</span>'
    : '<span style="background:#fef3c7;color:#d97706;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">🔮 Open for Prediction</span>';

  var predButtons = '';
  // Check if match has started based on matchDate
  var matchStarted = false;
  if (match.matchDate) {
    matchStarted = new Date() >= new Date(match.matchDate);
  }
  if (!isDone) {
    var alreadyPredicted = myPred !== '' || matchStarted;
    predButtons = '<div style="display:flex;gap:8px;margin-top:10px">'+
      iplTeamBtn(t1, match.fid, myPred, alreadyPredicted)+
      iplTeamBtn(t2, match.fid, myPred, alreadyPredicted)+
      '</div>'+
      (matchStarted && !myPred ? '<p style="font-size:11px;color:#dc2626;text-align:center;margin-top:4px">⏰ Match has started - predictions closed!</p>' :
       myPred ? '<p style="font-size:11px;color:#94a3b8;text-align:center;margin-top:4px">🔒 Prediction locked - '+myPred+' is your pick</p>' :
       '<p style="font-size:11px;color:#94a3b8;text-align:center;margin-top:4px">Tap to predict. Cannot be changed once submitted.</p>');
  }

  var resultSection = isDone
    ? '<div style="margin-top:10px;background:#f0fdf4;border-radius:8px;padding:10px;text-align:center">'+
      '<p style="font-size:13px;font-weight:800;color:#059669;margin:0">🏆 Winner: '+winner+'</p>'+
      (myPred === winner ? '<p style="font-size:12px;color:#059669;margin:4px 0 0">You predicted correctly! +10 pts 🎉</p>' :
       myPred ? '<p style="font-size:12px;color:#dc2626;margin:4px 0 0">Better luck next time!</p>' : '')+
      '</div>' : '';

  var declareBtn = (isHR && !isDone) ?
    '<div style="margin-top:10px">'+
    '<select id="winner_'+match.fid+'" class="fi" style="margin-bottom:6px">'+
    '<option value="">Select Winner...</option>'+
    '<option value="'+t1+'">'+t1+'</option>'+
    '<option value="'+t2+'">'+t2+'</option>'+
    '</select>'+
    '<button class="iplDeclareBtn gb" data-mid="'+match.fid+'" style="width:100%;background:#7c3aed">🏆 Declare Result & Pick Day Winner</button>'+
    '</div>' : '';

  return '<div class="uc" style="margin-bottom:10px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<div>'+
    '<p style="font-size:14px;font-weight:800;color:#111;margin:0">'+esc(t1)+' vs '+esc(t2)+'</p>'+
    (match.desc ? '<p style="font-size:11px;color:#64748b;margin:2px 0 0">'+esc(match.desc)+'</p>' : '')+
    (match.matchDate ? '<p style="font-size:11px;color:#94a3b8;margin:2px 0 0">'+new Date(match.matchDate).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'})+'</p>' : '')+
    (!isDone && match.matchDate && new Date() < new Date(match.matchDate) ?
      '<p style="font-size:11px;color:#d97706;font-weight:600;margin:2px 0 0">⏳ Closes in: '+timeLeft(match.matchDate)+'</p>' :
      (!isDone && match.matchDate && new Date() >= new Date(match.matchDate) ?
      '<p style="font-size:11px;color:#dc2626;font-weight:600;margin:2px 0 0">⏰ Predictions closed - match started!</p>' : '')
    )+
    '</div>'+
    statusBadge+
    '</div>'+
    '<div style="display:flex;gap:12px;font-size:12px;color:#64748b">'+
    '<span>Total predictions: <strong>'+totalPreds+'</strong></span>'+
    '<span>'+t1+': <strong>'+t1Count+'</strong></span>'+
    '<span>'+t2+': <strong>'+t2Count+'</strong></span>'+
    '</div>'+
    predButtons+
    resultSection+
    declareBtn+
    '</div>';
}

async function createIPLMatch() {
  var t1 = document.getElementById('iplT1').value;
  var t2 = document.getElementById('iplT2').value;
  var matchDate = document.getElementById('iplMatchDate').value;
  var desc = document.getElementById('iplMatchDesc').value.trim();
  if (!t1 || !t2) { toast('Select both teams!'); return; }
  if (t1 === t2) { toast('Teams must be different!'); return; }
  await fsAdd('ipl_matches', {
    team1: t1, team2: t2,
    matchDate: matchDate,
    desc: desc,
    status: 'open',
    winner: '',
    predictions: {},
    createdAt: new Date().toISOString()
  });
  toast('Match prediction created!');
  await renderIPLPage(document.getElementById('main'));
}

async function submitIPLPrediction(mid, team) {
  var matches = await fsGet('ipl_matches');
  var match = matches.find(function(m){ return m.fid === mid; });
  if (!match || match.status === 'done') { toast('Prediction closed!'); return; }
  // Check if match has started
  if (match.matchDate && new Date() >= new Date(match.matchDate)) {
    toast('⏰ Match has already started! Predictions are closed.'); return;
  }
  // Parse existing predictions
  var predictions = {};
  if (match.predictionsStr && match.predictionsStr.trim()) {
    match.predictionsStr.split('|').forEach(function(p){
      var idx = p.indexOf(':');
      if (idx > 0) predictions[p.slice(0,idx).trim()] = p.slice(idx+1).trim();
    });
  }
  // Check if already predicted - lock it
  if (predictions[CU.id]) {
    toast('You have already predicted ' + predictions[CU.id] + '! Prediction cannot be changed. 🔒');
    return;
  }
  predictions[CU.id] = team;
  var predStr = Object.keys(predictions).map(function(k){ return k+':'+predictions[k]; }).join('|');
  await fsPatch('ipl_matches', mid, {predictionsStr: predStr});
  toast('Predicted '+team+'! Good luck! 🏏');
  await renderIPLPage(document.getElementById('main'));
}

async function declareIPLResult(mid) {
  var winnerEl = document.getElementById('winner_'+mid);
  if (!winnerEl || !winnerEl.value) { toast('Please select the winning team!'); return; }
  var winner = winnerEl.value;

  var matches = await fsGet('ipl_matches');
  var match = matches.find(function(m){ return m.fid === mid; });
  if (!match) return;

  // Parse predictions
  var predictions = {};
  if (match.predictionsStr) {
    match.predictionsStr.split('|').forEach(function(p){
      var idx = p.indexOf(':');
      if (idx > 0) predictions[p.slice(0,idx)] = p.slice(idx+1);
    });
  }

  // Find correct predictors
  var correctPredictors = Object.keys(predictions).filter(function(uid){ return predictions[uid] === winner; });

  // Update points for correct predictors
  var assocs = await fsGet('associates');
  for (var i = 0; i < correctPredictors.length; i++) {
    var uid = correctPredictors[i];
    var assoc = assocs.find(function(a){ return a.id === uid; });
    if (!assoc) continue;
    var currentPts = parseInt(assoc.iplPoints || 0);
    await fsPatch('associates', assoc.fid, { iplPoints: String(currentPts + 10) });
  }

  // Pick random winner from correct predictors
  var dayWinner = null;
  if (correctPredictors.length > 0) {
    var randomUid = correctPredictors[Math.floor(Math.random() * correctPredictors.length)];
    dayWinner = assocs.find(function(a){ return a.id === randomUid; });
  }

  // Mark match as done
  await fsPatch('ipl_matches', mid, { status: 'done', winner: winner });

  // Post winner announcement
  if (dayWinner) {
    var matchLabel = match.team1 + ' vs ' + match.team2;
    await fsAdd('updates', {
      type: 'update',
      title: '🎉 IPL Prediction Winner!',
      body: 'Match: **'+matchLabel+'**\n\nWinner: **'+winner+'** 🏆\n\nCongratulations to **'+dayWinner.name+'** for correctly predicting the match winner! You have been selected as the lucky winner for this match! 🎊\n\n'+correctPredictors.length+' associate(s) predicted correctly and earned 10 points each!',
      tag: 'announcement',
      visibility: ['managers','sales','it','hr','operations'],
      author: 'Vendor Partner',
      image: '',
      createdAt: new Date().toISOString()
    });
  }

  toast('Result declared! '+(dayWinner ? dayWinner.name+' is the lucky winner! 🎉' : 'No correct predictions this time.'));
  S.updates = await fsGet('updates');
  await renderIPLPage(document.getElementById('main'));
}

async function buildLeaderboard(matches) {
  var assocs = await fsGet('associates');
  return assocs
    .filter(function(a){ return parseInt(a.iplPoints||0) > 0; })
    .map(function(a){ return {name: a.name, points: parseInt(a.iplPoints||0)}; })
    .sort(function(a,b){ return b.points - a.points; });
}

async function resetIPLSeason() {
  if (!confirm('Reset entire IPL season? This will clear all predictions, points and leaderboard!')) return;
  // Delete all ipl_matches
  var matches = await fsGet('ipl_matches');
  for (var i = 0; i < matches.length; i++) {
    await fsDel('ipl_matches', matches[i].fid);
  }
  // Reset all associate iplPoints to 0
  var assocs = await fsGet('associates');
  for (var i = 0; i < assocs.length; i++) {
    if (parseInt(assocs[i].iplPoints||0) > 0) {
      await fsPatch('associates', assocs[i].fid, { iplPoints: '0' });
    }
  }
  toast('IPL Season reset! Fresh start 🏏');
  await renderIPLPage(document.getElementById('main'));
}

  // Generic link

}

// UTILS
function fmt(ts) { if (!ts) return ''; try { return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); } catch(e) { return ''; } }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escBold(s) {
  return esc(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g,'<br>');
}
function toast(m) { var t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 3000); }
