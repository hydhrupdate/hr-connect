name: Daily Auto Post
 
on:
  schedule:
    # 12:30 AM UTC = 6:00 AM IST every day
    - cron: '30 0 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub
 
jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
 
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
 
      - name: Run Auto Post Script
        run: node autopost.js
 
