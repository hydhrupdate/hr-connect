<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Connect Portal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background: #111827; min-height: 100vh; }
#loginBox { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.box { background: white; border-radius: 16px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.logo { font-size: 22px; font-weight: 800; color: #111827; margin-bottom: 4px; }
.logo span { color: #059669; }
.sub { color: #64748b; font-size: 13px; margin-bottom: 24px; }
.tabs { display: flex; background: #f8fafc; border-radius: 8px; padding: 3px; margin-bottom: 18px; border: 1px solid #e5e7eb; }
.tab { flex:1; padding:8px; border:none; background:transparent; font-size:12px; font-weight:700; color:#64748b; border-radius:6px; cursor:pointer; }
.tab.on { background:#111827; color:white; }
label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:#64748b; margin-bottom:5px; }
input { width:100%; padding:11px 13px; border:1.5px solid #e5e7eb; border-radius:8px; font-size:14px; outline:none; margin-bottom:13px; }
input:focus { border-color:#059669; }
.lbtn { width:100%; padding:12px; background:#111827; border:none; border-radius:8px; color:white; font-size:14px; font-weight:700; cursor:pointer; }
.lbtn:hover { background:#059669; }
.lbtn:disabled { background:#94a3b8; cursor:not-allowed; }
.err { color:#dc2626; font-size:12px; margin-top:8px; display:none; background:#fee2e2; padding:7px; border-radius:6px; text-align:center; }
.dbst { font-size:11px; margin-top:10px; text-align:center; color:#64748b; background:#f1f5f9; padding:5px; border-radius:6px; }
#dash { display:none; background:#f8fafc; min-height:100vh; }
.topbar { background:#111827; height:54px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; }
.topbar-brand { color:white; font-size:16px; font-weight:800; }
.topbar-brand span { color:#6ee7b7; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.topbar-user { color:rgba(255,255,255,0.75); font-size:12px; }
.logout-btn { background:rgba(255,255,255,0.1); border:none; color:rgba(255,255,255,0.7); padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer; }
.logout-btn:hover { background:rgba(255,255,255,0.2); }
.nav { background:white; border-bottom:1px solid #e5e7eb; display:flex; gap:4px; padding:0 22px; }
.nav-btn { padding:12px 16px; border:none; background:transparent; font-size:13px; font-weight:700; color:#64748b; cursor:pointer; border-bottom:2px solid transparent; }
.nav-btn.on { color:#059669; border-bottom-color:#059669; }
.content { max-width:900px; margin:0 auto; padding:24px 18px; }
.card { background:white; border-radius:12px; border:1px solid #e5e7eb; padding:20px; margin-bottom:16px; }
.card h3 { font-size:15px; font-weight:700; margin-bottom:14px; color:#111827; }
.ci { width:100%; padding:10px 12px; border:1.5px solid #e5e7eb; border-radius:8px; font-size:13px; outline:none; margin-bottom:9px; font-family:Arial; }
.ci:focus { border-color:#059669; }
.cta { min-height:85px; resize:vertical; }
.row2 { display:flex; gap:8px; }
.row2 > * { flex:1; }
.green-btn { background:#059669; color:white; border:none; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
.green-btn:hover { background:#10b981; }
.green-btn:disabled { background:#94a3b8; cursor:not-allowed; }
.chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.chip { padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; border:1.5px solid #e5e7eb; background:white; cursor:pointer; color:#64748b; }
.chip.on { border-color:#059669; background:#d1fae5; color:#059669; }
.vchip.on { border-color:#2563eb; background:#dbeafe; color:#2563eb; }
.update-item { background:white; border-radius:10px; border:1px solid #e5e7eb; padding:15px; margin-bottom:10px; }
.update-item:hover { box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.item-meta { display:flex; gap:7px; align-items:center; flex-wrap:wrap; margin-bottom:7px; }
.itag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; text-transform:uppercase; }
.t-announcement{background:#d1fae5;color:#059669} .t-policy{background:#fef3c7;color:#d97706}
.t-event{background:#dbeafe;color:#2563eb} .t-reminder{background:#fee2e2;color:#dc2626} .t-general{background:#f1f5f9;color:#64748b}
.ivis { font-size:10px; color:#64748b; background:#f1f5f9; padding:2px 7px; border-radius:20px; }
.idate { font-size:10px; color:#94a3b8; }
.item-title { font-size:14px; font-weight:700; color:#111827; margin-bottom:4px; }
.item-body { font-size:13px; color:#4b5563; line-height:1.6; white-space:pre-wrap; }
.item-foot { margin-top:9px; padding-top:8px; border-top:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center; font-size:11px; color:#94a3b8; }
.del-btn { background:none; border:none; color:#dc2626; font-size:11px; cursor:pointer; }
.poll-item { background:white; border-radius:10px; border:1.5px solid #dbeafe; padding:15px; margin-bottom:10px; }
.poll-q { font-size:14px; font-weight:700; margin-bottom:10px; color:#111827; }
.poll-opt-btn { width:100%; padding:9px 13px; border:1.5px solid #e5e7eb; border-radius:8px; background:#f8fafc; font-size:13px; font-weight:600; cursor:pointer; text-align:left; margin-bottom:6px; display:block; }
.poll-opt-btn:hover { border-color:#2563eb; background:#dbeafe; color:#2563eb; }
.poll-bar { margin-bottom:7px; }
.poll-bar-label { display:flex; justify-content:space-between; font-size:11px; font-weight:700; margin-bottom:3px; }
.poll-bar-bg { height:6px; background:#e5e7eb; border-radius:10px; overflow:hidden; }
.poll-bar-fill { height:100%; background:#059669; border-radius:10px; transition:width 0.5s; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
.stat { background:white; border-radius:10px; border:1px solid #e5e7eb; padding:14px; }
.stat-n { font-size:26px; font-weight:800; color:#111827; }
.stat-l { font-size:11px; color:#64748b; }
.filter-pills { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
.fpill { padding:4px 11px; border-radius:20px; font-size:11px; font-weight:700; cursor:pointer; border:1.5px solid #e5e7eb; background:white; color:#64748b; }
.fpill.on { background:#111827; color:white; border-color:#111827; }
.assoc-list { }
.assoc-item { display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid #f1f5f9; flex-wrap:wrap; }
.assoc-id { font-weight:700; font-size:12px; width:75px; color:#111827; }
.assoc-name { flex:1; font-size:12px; color:#374151; min-width:120px; }
.status-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; }
.s-active { background:#d1fae5; color:#059669; }
.s-inactive { background:#f1f5f9; color:#64748b; }
.sm-btn { padding:4px 9px; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; border:1px solid #e5e7eb; background:white; color:#64748b; }
.sm-btn:hover { background:#f1f5f9; }
.empty { text-align:center; padding:36px; color:#94a3b8; font-size:13px; }
.toast { position:fixed; bottom:18px; right:18px; background:#111827; color:white; padding:11px 16px; border-radius:9px; font-size:13px; display:none; z-index:999; }
@media(max-width:580px){.stats{grid-template-columns:repeat(2,1fr)}.row2{flex-direction:column}}
</style>
</head>
<body>

<div id="loginBox">
  <div class="box">
    <div class="logo">HR <span>Connect</span></div>
    <div class="sub">Sign in to your portal</div>
    <div class="tabs">
      <button class="tab on" onclick="setRole('associate')">Associate</button>
      <button class="tab" onclick="setRole('manager')">Manager</button>
      <button class="tab" onclick="setRole('hr')">HR Admin</button>
    </div>
    <label id="idlbl">Employee ID</label>
    <input id="lid" type="text" placeholder="e.g. EMP001" />
    <label>Password</label>
    <input id="lpwd" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()" />
    <button class="lbtn" id="lbtn" onclick="login()">Sign In</button>
    <div class="err" id="lerr"></div>
    <div class="dbst" id="dbst">Connecting to database...</div>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <div class="topbar-brand">HR <span>Connect</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topuser"></span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="nav" id="nav"></div>
  <div class="content" id="main"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== FIREBASE REST API (no CDN scripts needed) =====
var PROJECT = "hr-connect-3c286";
var API_KEY = "AIzaSyA-5I3dKQnFaYF0I1tOUyYcRP-mhgEBlW0";
var BASE = "https://firestore.googleapis.com/v1/projects/" + PROJECT + "/databases/(default)/documents/";

async function fsGet(col) {
  var url = BASE + col + "?key=" + API_KEY + "&pageSize=200";
  var r = await fetch(url);
  if (!r.ok) throw new Error("GET failed: " + r.status);
  var data = await r.json();
  return (data.documents || []).map(function(d) {
    return Object.assign({ fid: d.name.split('/').pop() }, parseDoc(d.fields));
  });
}

async function fsAdd(col, obj) {
  var url = BASE + col + "?key=" + API_KEY;
  var r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({fields: toFields(obj)}) });
  if (!r.ok) throw new Error("ADD failed: " + r.status);
  return r.json();
}

async function fsUpdate(col, id, obj) {
  var fields = toFields(obj);
  var mask = Object.keys(fields).map(function(k){return "updateMask.fieldPaths="+k;}).join("&");
  var url = BASE + col + "/" + id + "?key=" + API_KEY + "&" + mask;
  var r = await fetch(url, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({fields: fields}) });
  if (!r.ok) throw new Error("UPDATE failed: " + r.status);
}

async function fsDel(col, id) {
  var url = BASE + col + "/" + id + "?key=" + API_KEY;
  var r = await fetch(url, { method:'DELETE' });
  if (!r.ok) throw new Error("DELETE failed: " + r.status);
}

function toFields(obj) {
  var f = {};
  Object.keys(obj).forEach(function(k) {
    var v = obj[k];
    if (v === null || v === undefined) f[k] = {nullValue: null};
    else if (typeof v === 'boolean') f[k] = {booleanValue: v};
    else if (typeof v === 'number') f[k] = {integerValue: String(v)};
    else if (typeof v === 'string') f[k] = {stringValue: v};
    else if (Array.isArray(v)) f[k] = {arrayValue: {values: v.map(function(i){ return {stringValue: String(i)}; })}};
    else if (typeof v === 'object') f[k] = {mapValue: {fields: toFields(v)}};
  });
  return f;
}

function parseDoc(fields) {
  if (!fields) return {};
  var obj = {};
  Object.keys(fields).forEach(function(k) {
    var v = fields[k];
    if ('stringValue' in v) obj[k] = v.stringValue;
    else if ('integerValue' in v) obj[k] = parseInt(v.integerValue);
    else if ('booleanValue' in v) obj[k] = v.booleanValue;
    else if ('nullValue' in v) obj[k] = null;
    else if ('arrayValue' in v) obj[k] = (v.arrayValue.values || []).map(function(i){ return i.stringValue || i.integerValue || ''; });
    else if ('mapValue' in v) obj[k] = parseDoc(v.mapValue.fields);
    else if ('timestampValue' in v) obj[k] = new Date(v.timestampValue);
  });
  return obj;
}

// ===== APP STATE =====
var S = { user:null, assocs:[], updates:[], tag:'announcement', vis:['all'], popts:['',''], filter:'all', page:'feed', role:'associate' };
var HRPWD = 'hr@2024';
var GROUPS = ['all','managers','sales','it','hr','operations'];
var TAGS = [{k:'announcement',l:'Announcement'},{k:'policy',l:'Policy'},{k:'event',l:'Event'},{k:'reminder',l:'Reminder'},{k:'general',l:'General'}];

// Init
init();

async function init() {
  try {
    await loadAssocs();
    await loadUpdates();
    setDbStatus('Database connected', '#d1fae5', '#059669');
  } catch(e) {
    console.error(e);
    setDbStatus('DB offline - HR login still works', '#fee2e2', '#dc2626');
  }
}

function setDbStatus(msg, bg, col) {
  var el = document.getElementById('dbst');
  if (el) { el.textContent = msg; el.style.background = bg||'#f1f5f9'; el.style.color = col||'#64748b'; }
}

async function loadAssocs() {
  S.assocs = await fsGet('associates');
}

async function loadUpdates() {
  S.updates = await fsGet('updates');
  S.updates.sort(function(a,b){
    var ta = a.createdAt ? new Date(a.createdAt).getTime() : 0;
    var tb = b.createdAt ? new Date(b.createdAt).getTime() : 0;
    return tb - ta;
  });
}

// ===== AUTH =====
function setRole(r) {
  S.role = r;
  document.querySelectorAll('.tab').forEach(function(b,i){ b.classList.toggle('on', ['associate','manager','hr'][i]===r); });
  document.getElementById('idlbl').textContent = r==='hr'?'HR Admin ID':r==='manager'?'Manager ID':'Employee ID';
}

async function login() {
  var id = document.getElementById('lid').value.trim().toUpperCase();
  var pwd = document.getElementById('lpwd').value;
  var btn = document.getElementById('lbtn');
  var err = document.getElementById('lerr');
  err.style.display='none'; btn.disabled=true; btn.textContent='Signing in...';
  try {
    if (id==='HRADMIN' && pwd===HRPWD) { enterDash({id:'HRADMIN',name:'HR Admin',role:'hr',group:'all'}); return; }
    var u = S.assocs.find(function(a){ return a.id===id && a.password===pwd; });
    if (!u) { err.textContent='Invalid credentials.'; err.style.display='block'; return; }
    if (u.status==='inactive') { err.textContent='Account deactivated. Contact HR.'; err.style.display='block'; return; }
    enterDash(u);
  } catch(e) { err.textContent='Error. Try again.'; err.style.display='block'; }
  finally { btn.disabled=false; btn.textContent='Sign In'; }
}

function enterDash(user) {
  S.user = user;
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  document.getElementById('topuser').textContent = user.name + (user.role==='hr'?' | HR Admin':user.role==='manager'?' | Manager':'');
  S.page = 'feed';
  renderNav(); renderPage();
}

function logout() {
  S.user=null; S.page='feed'; S.filter='all';
  document.getElementById('loginBox').style.display='flex';
  document.getElementById('dash').style.display='none';
  document.getElementById('lid').value=''; document.getElementById('lpwd').value='';
}

// ===== NAV =====
function renderNav() {
  var isHR = S.user && S.user.role==='hr';
  var items = [{id:'feed',l:'Updates Feed'}];
  if (isHR) items.push({id:'post',l:'Post Update'},{id:'poll',l:'Create Poll'},{id:'associates',l:'Manage Associates'});
  document.getElementById('nav').innerHTML = items.map(function(i){
    return '<button class="nav-btn '+(S.page===i.id?'on':'')+'" onclick="goTo(''+i.id+'')">'+i.l+'</button>';
  }).join('');
}

function goTo(p) { S.page=p; renderNav(); renderPage(); }

// ===== PAGES =====
function renderPage() {
  var main = document.getElementById('main');
  if (!main) return;
  if (S.page==='feed') renderFeed(main);
  else if (S.page==='post') renderPost(main);
  else if (S.page==='poll') renderPollPg(main);
  else if (S.page==='associates') renderAssocsPg(main);
}

function renderFeed(main) {
  var u=S.user, isHR=u.role==='hr';
  var items = S.updates.filter(function(upd){
    if (isHR) return true;
    return upd.visibility && (upd.visibility.indexOf('all')>=0 || upd.visibility.indexOf(u.group)>=0);
  });
  if (S.filter!=='all') items=items.filter(function(i){ return i.type==='poll'?S.filter==='poll':i.tag===S.filter; });
  var stats='';
  if (isHR) {
    stats='<div class="stats">'+
      '<div class="stat"><div class="stat-n">'+S.assocs.filter(function(a){return a.status==='active';}).length+'</div><div class="stat-l">Active Associates</div></div>'+
      '<div class="stat"><div class="stat-n">'+S.updates.filter(function(u){return u.type==='update';}).length+'</div><div class="stat-l">Updates Posted</div></div>'+
      '<div class="stat"><div class="stat-n">'+S.updates.filter(function(u){return u.type==='poll';}).length+'</div><div class="stat-l">Polls</div></div>'+
      '<div class="stat"><div class="stat-n">'+S.assocs.filter(function(a){return a.status==='inactive';}).length+'</div><div class="stat-l">Deactivated</div></div>'+
      '</div>';
  }
  var fls=['all','announcement','policy','event','reminder','poll'];
  var fln={all:'All',announcement:'Announcements',policy:'Policy',event:'Events',reminder:'Reminders',poll:'Polls'};
  main.innerHTML=stats+
    '<div class="filter-pills">'+fls.map(function(f){return '<button class="fpill '+(S.filter===f?'on':'')+'" onclick="setFilt(''+f+'')">'+fln[f]+'</button>';}).join('')+'</div>'+
    '<div id="flist"></div>';
  var fl=document.getElementById('flist');
  if (!items.length){fl.innerHTML='<div class="empty">'+(isHR?'No updates yet. Post your first!':'No updates yet.')+'</div>';return;}
  fl.innerHTML=items.map(function(item,i){return item.type==='poll'?makePoll(item,isHR):makeUpdate(item,isHR);}).join('');
}

function setFilt(f){S.filter=f;renderPage();}

function makeUpdate(u,isHR){
  var tag=TAGS.find(function(t){return t.k===u.tag;})||TAGS[4];
  var vis=u.visibility&&u.visibility.indexOf('all')>=0?'All Staff':(u.visibility||[]).map(function(v){return v.charAt(0).toUpperCase()+v.slice(1);}).join(', ');
  return '<div class="update-item">'+
    '<div class="item-meta"><span class="itag t-'+u.tag+'">'+tag.l+'</span><span class="ivis">'+vis+'</span><span class="idate">'+fmt(u.createdAt)+'</span></div>'+
    '<div class="item-title">'+esc(u.title)+'</div>'+
    '<div class="item-body">'+esc(u.body)+'</div>'+
    '<div class="item-foot"><span>By '+esc(u.author||'HR')+'</span>'+(isHR?'<button class="del-btn" onclick="delItem(''+u.fid+'')">Delete</button>':'')+'</div>'+
    '</div>';
}

function makePoll(p,isHR){
  var tot=0;
  if (p.votes && typeof p.votes==='object') Object.keys(p.votes).forEach(function(k){tot+=parseInt(p.votes[k])||0;});
  var voted=p.votedBy && p.votedBy.indexOf(S.user.id)>=0;
  var show=isHR||voted;
  var opts=(p.options||[]).map(function(opt){
    if(show){
      var c=p.votes&&p.votes[opt]?parseInt(p.votes[opt]):0;
      var pc=tot>0?Math.round(c/tot*100):0;
      return '<div class="poll-bar"><div class="poll-bar-label"><span>'+esc(opt)+'</span><span>'+c+' ('+pc+'%)</span></div><div class="poll-bar-bg"><div class="poll-bar-fill" style="width:'+pc+'%"></div></div></div>';
    }
    return '<button class="poll-opt-btn" onclick="castVote(''+p.fid+'',''+esc(opt)+'')">'+esc(opt)+'</button>';
  }).join('');
  return '<div class="poll-item">'+
    '<div class="item-meta"><span class="itag" style="background:#dbeafe;color:#2563eb">POLL'+(voted?' - VOTED':'')+'</span></div>'+
    '<div class="poll-q">'+esc(p.question)+'</div>'+opts+
    '<div class="item-foot"><span>'+tot+' votes</span>'+(isHR?'<button class="del-btn" onclick="delItem(''+p.fid+'')">Delete</button>':'')+'</div>'+
    '</div>';
}

async function castVote(pid,opt){
  var poll=S.updates.find(function(u){return u.fid===pid;});
  if(!poll)return;
  if(poll.votedBy && poll.votedBy.indexOf(S.user.id)>=0){showToast('Already voted!');return;}
  var nv=Object.assign({},poll.votes||{});
  nv[opt]=(parseInt(nv[opt])||0)+1;
  var nb=(poll.votedBy||[]).concat([S.user.id]);
  await fsUpdate('updates',pid,{votes:nv,votedBy:nb});
  await loadUpdates(); renderPage(); showToast('Vote submitted!');
}

async function delItem(id){
  if(!confirm('Delete?'))return;
  await fsDel('updates',id);
  await loadUpdates(); renderPage(); showToast('Deleted');
}

function renderPost(main){
  var th=TAGS.map(function(t){return '<span class="chip '+(S.tag===t.k?'on':'')+'" onclick="setTag(''+t.k+'')">'+t.l+'</span>';}).join('');
  var vh=GROUPS.map(function(g){return '<span class="chip vchip '+(S.vis.indexOf(g)>=0?'on':'')+'" onclick="togVis(''+g+'')">'+( g==='all'?'All Staff':g.charAt(0).toUpperCase()+g.slice(1))+'</span>';}).join('');
  main.innerHTML='<div class="card"><h3>Post New Update</h3>'+
    '<input class="ci" id="pt" placeholder="Title..."/>'+
    '<textarea class="ci cta" id="pb" placeholder="Message..."></textarea>'+
    '<div style="margin-bottom:9px"><label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:#64748b;display:block;margin-bottom:5px">Tag</label><div class="chips">'+th+'</div></div>'+
    '<div style="margin-bottom:13px"><label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:#64748b;display:block;margin-bottom:5px">Visible To</label><div class="chips">'+vh+'</div></div>'+
    '<button class="green-btn" id="pbtn" onclick="subPost()">Publish Update</button></div>';
}

function setTag(t){S.tag=t;renderPage();}
function togVis(g){
  if(g==='all'){S.vis=['all'];}
  else{S.vis=S.vis.filter(function(v){return v!=='all';});var i=S.vis.indexOf(g);if(i>=0)S.vis.splice(i,1);else S.vis.push(g);if(!S.vis.length)S.vis=['all'];}
  renderPage();
}

async function subPost(){
  var t=document.getElementById('pt').value.trim(),b=document.getElementById('pb').value.trim();
  if(!t||!b){alert('Fill title and message.');return;}
  var btn=document.getElementById('pbtn');btn.disabled=true;btn.textContent='Publishing...';
  try{
    await fsAdd('updates',{type:'update',title:t,body:b,tag:S.tag,visibility:S.vis.slice(),author:S.user.name,createdAt:new Date().toISOString()});
    S.tag='announcement';S.vis=['all'];S.page='feed';
    await loadUpdates(); renderNav(); renderPage(); showToast('Update published!');
  }finally{btn.disabled=false;btn.textContent='Publish Update';}
}

function renderPollPg(main){
  var oh=S.popts.map(function(o,i){
    return '<div style="display:flex;gap:7px;margin-bottom:7px"><input class="ci" style="margin:0;flex:1" value="'+esc(o)+'" oninput="S.popts['+i+']=this.value" placeholder="Option '+(i+1)+'..."/>'+(S.popts.length>2?'<button onclick="remOpt('+i+')" style="background:none;border:none;color:#dc2626;font-size:16px;cursor:pointer">x</button>':'')+'</div>';
  }).join('');
  var vh=GROUPS.map(function(g){return '<span class="chip vchip '+(S.vis.indexOf(g)>=0?'on':'')+'" onclick="togVis(''+g+'')">'+( g==='all'?'All Staff':g.charAt(0).toUpperCase()+g.slice(1))+'</span>';}).join('');
  main.innerHTML='<div class="card"><h3>Create a Poll</h3>'+
    '<input class="ci" id="pq2" placeholder="Question..."/>'+
    '<div id="polist" style="margin-bottom:7px">'+oh+'</div>'+
    '<button class="sm-btn" onclick="addOpt()" style="margin-bottom:13px">+ Add Option</button>'+
    '<div style="margin-bottom:13px"><label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:#64748b;display:block;margin-bottom:5px">Visible To</label><div class="chips">'+vh+'</div></div>'+
    '<button class="green-btn" id="pllbtn" onclick="subPoll()">Launch Poll</button></div>';
}

function addOpt(){S.popts.push('');renderPage();}
function remOpt(i){S.popts.splice(i,1);renderPage();}

async function subPoll(){
  var q=document.getElementById('pq2').value.trim();
  var opts=S.popts.filter(function(o){return o.trim();});
  if(!q||opts.length<2){alert('Enter question and at least 2 options.');return;}
  var btn=document.getElementById('pllbtn');btn.disabled=true;btn.textContent='Launching...';
  var votes={};opts.forEach(function(o){votes[o]=0;});
  try{
    await fsAdd('updates',{type:'poll',question:q,options:opts,votes:votes,visibility:S.vis.slice(),votedBy:[],createdAt:new Date().toISOString()});
    S.popts=['',''];S.vis=['all'];S.page='feed';
    await loadUpdates(); renderNav(); renderPage(); showToast('Poll launched!');
  }finally{btn.disabled=false;btn.textContent='Launch Poll';}
}

async function renderAssocsPg(main){
  await loadAssocs();
  var rows=S.assocs.length===0?'<div class="empty">No associates yet. Add your first one above!</div>':
    S.assocs.map(function(a){
      return '<div class="assoc-item">'+
        '<div class="assoc-id">'+esc(a.id)+'</div>'+
        '<div class="assoc-name">'+esc(a.name)+' <span style="color:#94a3b8;font-size:10px">('+a.role+', '+a.group+')</span></div>'+
        '<span class="status-badge '+(a.status==='active'?'s-active':'s-inactive')+'">'+(a.status==='active'?'Active':'Inactive')+'</span>'+
        (a.status==='active'?'<button class="sm-btn" onclick="togSt(''+a.fid+'','inactive')">Deactivate</button>':'<button class="sm-btn" style="color:#059669" onclick="togSt(''+a.fid+'','active')">Reactivate</button>')+
        '<button class="sm-btn" style="color:#dc2626" onclick="remAssoc(''+a.fid+'')">Delete</button>'+
        '</div>';
    }).join('');
  main.innerHTML='<div class="card"><h3>Add New Associate</h3>'+
    '<div class="row2"><input class="ci" id="nid" placeholder="Employee ID (e.g. EMP005)"/><input class="ci" id="nnm" placeholder="Full Name"/></div>'+
    '<div class="row2"><input class="ci" id="npw" placeholder="Password"/>'+
    '<select class="ci" id="nrl"><option value="associate">Associate</option><option value="manager">Manager</option></select>'+
    '<select class="ci" id="ngp">'+GROUPS.filter(function(g){return g!=='all';}).map(function(g){return '<option value="'+g+'">'+g.charAt(0).toUpperCase()+g.slice(1)+'</option>';}).join('')+'</select></div>'+
    '<button class="green-btn" id="abtn" onclick="addAssoc()">+ Add Associate</button></div>'+
    '<div class="card"><h3>All Associates ('+S.assocs.length+')</h3><div class="assoc-list">'+rows+'</div></div>';
}

async function addAssoc(){
  var id=document.getElementById('nid').value.trim().toUpperCase();
  var name=document.getElementById('nnm').value.trim();
  var pwd=document.getElementById('npw').value.trim();
  var role=document.getElementById('nrl').value;
  var group=document.getElementById('ngp').value;
  if(!id||!name||!pwd){alert('Fill all fields.');return;}
  if(S.assocs.find(function(a){return a.id===id;})){alert('ID already exists.');return;}
  var btn=document.getElementById('abtn');btn.disabled=true;btn.textContent='Adding...';
  try{
    await fsAdd('associates',{id:id,name:name,password:pwd,role:role,group:group,status:'active',createdAt:new Date().toISOString()});
    await loadAssocs();renderPage();showToast('Associate added!');
  }finally{btn.disabled=false;btn.textContent='+ Add Associate';}
}

async function togSt(fid,ns){
  await fsUpdate('associates',fid,{status:ns});
  await loadAssocs();renderPage();showToast(ns==='active'?'Reactivated':'Deactivated');
}

async function remAssoc(fid){
  if(!confirm('Delete permanently?'))return;
  await fsDel('associates',fid);
  await loadAssocs();renderPage();showToast('Removed');
}

function fmt(ts){if(!ts)return '';try{var d=new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}
</script>
</body>
</html>
